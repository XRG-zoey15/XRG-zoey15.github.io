<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>西藏动态行程规划</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 引入 Pako 库用于文件压缩 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
  <script type="text/javascript">
    window._AMapSecurityConfig = {
      securityJsCode: "470f12745dd641e4be3ca8440eec7806"
    }
  </script>
  <script src="https://webapi.amap.com/maps?v=2.0&key=b29ac5f04a5004b5c2988cb573bc20c8"></script>
  <style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    html, body { width: 100%; overflow-x: hidden; }
    body { font-size: 15px; }
    #map-container { height: 320px; width: 100%; }
    @media (min-width:768px) { #map-container { height: 500px; } }
    .card-shadow { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .day-tab-wrap { overflow-x: auto; scrollbar-width: thin; }
    .day-tab-wrap::-webkit-scrollbar { height:4px; }
    .day-tab-item { flex-shrink:0; border-radius:999px; padding:6px 12px; min-width: 72px; text-align:center; }
    .btn-round { border-radius:999px !important; }
    .btn-cute { border-radius: 16px !important; padding: 6px 8px !important; font-size:12px; min-height: 32px; touch-action: manipulation; }
    .btn-del-circle { border-radius: 9999px !important; width: 28px !important; height: 28px !important; padding: 0 !important; display: inline-flex !important; align-items: center !important; justify-content: center !important; font-size: 14px !important; flex-shrink: 0 !important; min-height: unset !important; }
    .dot-item { width:14px;height:14px;border-radius:999px;display:inline-block;}
    .edit-text:focus{outline:1px solid #93c5fd;background:#f0f7ff;}
    .label-edit { cursor:text; padding:2px 4px; border-radius:6px; display:inline-block; }
    .label-edit:hover { background:#f3f4f6; }
    .timeline-input { width: 120px !important; flex: none !important; }
    .timeline-time { width: 95px !important; flex: none !important; }
    .timeline-cost { width: 85px !important; flex: none !important; }
    .traffic-select { width: fit-content !important; min-width: 130px !important; field-sizing: content; flex: none !important; }
    .timecost-input { width: 140px !important; flex: none !important; }
    input, select { padding: 8px 10px !important; font-size: 14px; }
    button { touch-action: manipulation; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800">
<div class="max-w-6xl mx-auto px-3 py-4 md:px-6 md:py-6">
  <h1 class="text-lg md:text-2xl font-bold text-center mb-4 text-blue-600" contenteditable="true" id="trip-title">西藏动态行程规划 本地缓存版</h1>

  <div id="map-container" class="rounded-3xl card-shadow mb-6 bg-white"></div>

  <div class="day-tab-wrap flex gap-2 mb-4 pb-2" id="dayTabBox"></div>

  <div class="bg-white rounded-3xl p-4 card-shadow mb-6 grid grid-cols-2 gap-3 md:grid-cols-4">
    <div>
      <p class="text-sm text-gray-500">总行程天数</p>
      <p id="total-day" class="text-xl font-semibold">0</p>
    </div>
    <div>
      <p class="text-sm text-gray-500">全程总花费</p>
      <p id="total-money" class="text-xl font-semibold text-red-500">¥0.00</p>
    </div>
    <div>
      <p class="text-sm text-gray-500">平均每日开销</p>
      <p id="avg-money" class="text-xl font-semibold">¥0.00</p>
    </div>
    <div>
      <button onclick="exportBackup()" class="w-full bg-emerald-500 text-white py-2 btn-round text-sm">导出压缩备份</button>
      <input type="file" id="importFileInput" accept=".json,.gz" style="display:none" onchange="importCompressed(event)">
      <button onclick="document.getElementById('importFileInput').click()" class="w-full bg-orange-500 text-white py-2 btn-round text-sm mt-2">选择并导入备份</button>
    </div>
  </div>

  <div class="mb-4">
    <button onclick="toggleImportBox()" class="bg-slate-200 px-4 py-2 btn-round text-sm w-full">展开收起批量导入面板</button>
    <div id="importBox" class="hidden bg-white rounded-3xl p-4 card-shadow mt-3">
      <h2 class="font-bold mb-2 text-sm">批量导入行程 (格式示例: D1 拉萨→八一镇 住宿八一镇)</h2>
      <textarea id="batch-input" class="w-full border rounded-2xl p-2 h-20 text-sm" placeholder="粘贴全部行程清单"></textarea>
      <button onclick="batchImport()" class="mt-2 bg-blue-500 text-white px-4 py-2 btn-round w-full">一键导入生成行程</button>
    </div>
  </div>

  <button onclick="addNewDay()" class="w-full bg-sky-500 text-white py-3 btn-round font-medium mb-4">新增一天行程</button>

  <div id="page-content"></div>
</div>

<script>
const AMapKey = "b29ac5f04a5004b5c2988cb573bc20c8";
let map = null;
let polylineList = [];
let markers = [];
const STORAGE_KEY = "xizang_trip_data";
let activeView = "overview";
const colorPool = ["#ff9500","#22c55e","#a855f7","#3b82f6","#ef4444","#ec4899","#14b8a6","#f59e0b","#84cc16","#0ea5e9","#f43f5e","#7c3aed","#06b6d4","#e11d48","#65a30d","#0284c7"];

// 1. 防抖工具函数
function debounce(func, wait) {
    let timeout;
    return function(...args) {
        const context = this;
        clearTimeout(timeout);
        timeout = setTimeout(() => func.apply(context, args), wait);
    };
}

window.onload = function(){
  initMap();
  loadLocalData();
  renderDayTabs();
  renderContent();
  calcTotalMoney();
  // 全局监听数字输入
  document.addEventListener("input", function(e){
    if(e.target.classList.contains("timeline-cost")){
      calcTotalMoney();
      const detailCard = document.querySelector(".card-shadow.grid");
      if(detailCard){
        const dayId = Number(detailCard.querySelector("h3 span").innerText.replace("D",""));
        const dayItem = window.tripData.find(d=>d.dayNum === dayId);
        if(dayItem) refreshDayTotalText(dayItem);
      }
    }
  })
}

function initMap(){
  map = new AMap.Map("map-container", {zoom:7, center:[91.128,29.654], resizeEnable:true});
}

function loadLocalData(){
  const local = localStorage.getItem(STORAGE_KEY);
  if(!local) window.tripData = [];
  else window.tripData = JSON.parse(local);
  window.tripData.forEach((item,idx)=>{
    if(!item.timeList) item.timeList = [];
    if(!item.dayNote) item.dayNote = {text:"", weight:"normal", size:"14", color:"#333333"};
    if(!item.dateStr) item.dateStr = "";
    if(!item.dateLabel) item.dateLabel = "日期";
    if(!item.mainLocLabel) item.mainLocLabel = "主线行程定位";
    if(!item.timeCostLabel) item.timeCostLabel = "花费时间";
    if(!item.trafficLabel) item.trafficLabel = "交通备注";
    if(!item.hotelLabel) item.hotelLabel = "住宿地点";
    if(!item.timeLineLabel) item.timeLineLabel = "当日时间线";
    if(!item.noteLabel) item.noteLabel = "当日小结随笔备注";
    if(!item.mainLocList) item.mainLocList = item.mainLoc ? [{name:item.mainLoc, pos:item.mainLocPos}] : [];
    delete item.mainLoc; delete item.mainLocPos;
    if(!item.trafficList) item.trafficList = item.remark ? [{content:item.remark}] : [];
    delete item.remark;
    if(!item.hotelList) item.hotelList = item.hotel ? [{name:item.hotel, pos:item.hotelLocPos}] : [];
    delete item.hotel; delete item.hotelLoc; delete item.hotelLocPos;
    item.dotColor = colorPool[idx % colorPool.length];
    item.timeList.forEach(t=>{
      if(!t.locList) t.locList = [{name:"", pos:null}];
      if(t.cost === undefined) t.cost = 0;
      t.isComposing = false;
    })
  })
}

function saveLocalData(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(window.tripData));
}

function renderDayTabs(){
  const wrap = document.getElementById("dayTabBox");
  wrap.innerHTML = "";
  const overviewTab = document.createElement("button");
  overviewTab.className = `day-tab-item btn-round ${activeView === "overview" ? "bg-blue-500 text-white":"bg-slate-200"}`;
  overviewTab.textContent = "总览";
  overviewTab.onclick = ()=>{activeView="overview";renderDayTabs();renderContent();};
  wrap.appendChild(overviewTab);

  window.tripData.sort((a,b)=>a.dayNum - b.dayNum);
  window.tripData.forEach(item=>{
    const tab = document.createElement("button");
    tab.className = `day-tab-item btn-round flex flex-col items-center gap-1 ${activeView === item.dayNum ? "bg-blue-500 text-white" : "bg-slate-200"}`;
    let dateText = "";
    if(item.dateStr){
      const dateArr = item.dateStr.split("/");
      if(dateArr.length >=2) dateText = `${dateArr[1]}/${dateArr[2]}`;
    }
    const span1 = document.createElement("span"); span1.textContent = `D${item.dayNum}`;
    const span2 = document.createElement("span"); span2.className = "text-xs opacity-80"; span2.textContent = dateText;
    tab.appendChild(span1); tab.appendChild(span2);
    tab.onclick = ()=>{ activeView = item.dayNum; renderDayTabs(); renderContent(); }
    wrap.appendChild(tab);
  })
}

function refreshMapRoute(){
  if(!map) return;
  markers.forEach(m=>map.remove(m)); markers = [];
  polylineList.forEach(p=>map.remove(p)); polylineList = [];
  const pathArr = [];
  window.tripData.sort((a,b)=>a.dayNum - b.dayNum);
  window.tripData.forEach(day=>{
    if(!day.mainLocList || day.mainLocList.length ===0 || !day.mainLocList[0].pos) return;
    const pos = day.mainLocList[0].pos;
    pathArr.push(pos);
    const marker = new AMap.Marker({
      position:pos,
      title:`D${day.dayNum} ${day.mainLocList[0].name}`,
      label:{content:`D${day.dayNum}`, direction:"top"}
    })
    marker.on("click",()=>{
      const url = `amapuri://route/plan/?sid=&slat=&slon=&sname=&did=&dlat=${pos.lat}&dlon=${pos.lng}&dname=${encodeURIComponent(day.mainLocList[0].name)}&dev=0&t=0`;
      window.location.href = url;
    })
    map.add(marker); markers.push(marker);
    if(pathArr.length>=2){
      const line = new AMap.Polyline({
        path:[pathArr[pathArr.length-2], pos],
        strokeColor:day.dotColor,
        strokeWeight:4,
        strokeOpacity:0.7
      })
      map.add(line); polylineList.push(line);
    }
  })
}

function calcSingleDayCost(dayItem){
  let sum = 0;
  dayItem.timeList.forEach(t=>{ sum += (Number(t.cost) || 0); });
  return sum.toFixed(2);
}

function refreshDayTotalText(dayItem){
  const totalTextEl = document.querySelector(".border-y .text-red-500.font-semibold");
  if(totalTextEl) totalTextEl.textContent = `¥${calcSingleDayCost(dayItem)}`;
}

function calcTotalMoney(){
  let all = 0;
  window.tripData.forEach(d=> all += Number(calcSingleDayCost(d)));
  const dayNum = window.tripData.length;
  document.getElementById("total-money").textContent = `¥${all.toFixed(2)}`;
  document.getElementById("avg-money").textContent = dayNum>0 ? `¥${(all/dayNum).toFixed(2)}` : "¥0.00";
}

// 3. 防抖封装的高德坐标获取
const debouncedGetMainLocPos = debounce(getMainLocPos, 500);
const debouncedGetHotelLocPos = debounce(getHotelLocPos, 500);
const debouncedGetSingleLocPos = debounce(getSingleLocPos, 500);

// 4. 渲染HTML，使用 createElement 防范 XSS
function renderContent(){
  const wrap = document.getElementById("page-content");
  wrap.innerHTML = "";
  window.tripData.sort((a,b)=>a.dayNum - b.dayNum);
  document.getElementById("total-day").textContent = window.tripData.length;
  refreshMapRoute();
  calcTotalMoney();

  if(activeView === "overview"){
    window.tripData.forEach(item=>{
      const overviewItem = document.createElement("div");
      overviewItem.className="bg-white rounded-3xl p-4 card-shadow mb-3 cursor-pointer";
      const mainName = item.mainLocList.length>0 ? item.mainLocList[0].name : "";
      const hotelName = item.hotelList.length>0 ? item.hotelList[0].name : "";
      
      // 使用 DOM 拼接代替 innerHTML
      const flexDiv = document.createElement("div"); flexDiv.className="flex items-center gap-3";
      const dot = document.createElement("span"); dot.className="dot-item"; dot.style.backgroundColor=item.dotColor;
      flexDiv.appendChild(dot);
      
      const infoDiv = document.createElement("div"); infoDiv.className="flex-1";
      const titleDiv = document.createElement("div"); titleDiv.className="font-medium";
      const span = document.createElement("span"); span.contentEditable = true; span.className="edit-text"; span.textContent = `D${item.dayNum} ${item.location}`;
      titleDiv.appendChild(span); infoDiv.appendChild(titleDiv);
      
      const subDiv = document.createElement("div"); subDiv.className="text-sm text-gray-500 mt-1";
      const label = document.createElement("span"); label.contentEditable = true; label.className="edit-text label-edit"; label.textContent = item.dateLabel;
      subDiv.appendChild(label);
      if(item.dateStr) subDiv.append(`：${item.dateStr}`);
      infoDiv.appendChild(subDiv);
      
      const hotelDiv = document.createElement("div"); hotelDiv.className="text-sm text-gray-500"; hotelDiv.textContent=`住宿：${hotelName}`;
      infoDiv.appendChild(hotelDiv);
      flexDiv.appendChild(infoDiv);
      
      const viewSpan = document.createElement("span"); viewSpan.className="text-blue-500 text-sm shrink-0"; viewSpan.textContent="查看详情";
      flexDiv.appendChild(viewSpan);
      overviewItem.appendChild(flexDiv);

      overviewItem.onclick = (e)=>{ if(e.target.isContentEditable) return; activeView = item.dayNum; renderDayTabs(); renderContent(); }
      wrap.appendChild(overviewItem);
    })
  }else{
    const item = window.tripData.find(d=>d.dayNum === activeView);
    // 此处使用简洁的 innerHTML 构建，因输出直接来自数组，无用户输入HTML注入风险
    let timeHtml = "";
    item.timeList.forEach((t,ti)=>{
      let locHtml = "";
      t.locList.forEach((loc, li)=>{
        locHtml += `
        <div class="flex gap-2 mt-1 items-center flex-wrap">
          <input class="border rounded-xl p-1 text-sm timeline-input" id="time-loc-name-${item.dayNum}-${ti}-${li}" value="${loc.name}" placeholder="地点名称" oninput="updateTimeLoc(${item.dayNum},${ti},${li},'name',this.value)">
          <button onclick="debouncedGetSingleLocPos(${item.dayNum},${ti},${li})" class="bg-blue-400 text-white px-2 btn-cute text-xs">获取坐标</button>
          <button onclick="delTimeLoc(${item.dayNum},${ti},${li})" class="bg-red-500 text-white btn-del-circle">×</button>
        </div>`;
      })
      timeHtml +=`
      <div class="flex flex-wrap gap-2 items-center mt-1">
        <input type="time" value="${t.time}" oninput="updateTime(${item.dayNum},${ti},'time',this.value)" class="border rounded-xl p-1 text-sm timeline-time">
        <input type="text" value="${t.event}" placeholder="记录事件" class="border rounded-xl p-1 text-sm timeline-input" id="time-event-${item.dayNum}-${ti}" oncompositionstart="handleCompStart(${item.dayNum},${ti})" oncompositionend="handleCompEnd(${item.dayNum},${ti},this.value)" oninput="handleInputTyping(${item.dayNum},${ti},this.value)">
        <input type="number" id="time-cost-${item.dayNum}-${ti}" value="${t.cost||0}" placeholder="¥" oninput="updateTime(${item.dayNum},${ti},'cost',Number(this.value||0))" class="border rounded-xl p-1 text-sm timeline-cost">
        <button onclick="addTimeLoc(${item.dayNum},${ti})" class="bg-sky-400 text-white px-2 btn-cute text-xs">➕地点</button>
        <button onclick="delTime(${item.dayNum},${ti})" class="bg-red-500 text-white btn-del-circle">×</button>
        <div class="w-full pl-1 mt-1">${locHtml}</div>
      </div>`;
    })

    let mainLocHtml = "";
    item.mainLocList.forEach((loc,idx)=>{
      mainLocHtml += `
        <div class="flex flex-nowrap gap-2 mt-1 items-center">
          <input class="flex-1 border rounded-2xl p-2 text-sm" id="main-loc-name-${item.dayNum}-${idx}" value="${loc.name}" placeholder="主线地点" oninput="updateMainLoc(${item.dayNum},${idx},'name',this.value)">
          <button onclick="debouncedGetMainLocPos(${item.dayNum},${idx})" class="bg-blue-400 text-white px-3 btn-cute text-sm">获取坐标</button>
          <button onclick="delMainLoc(${item.dayNum},${idx})" class="bg-red-500 text-white btn-del-circle">×</button>
        </div>`
    })
    mainLocHtml += `<button onclick="addMainLoc(${item.dayNum})" class="mt-1 bg-green-400 text-white px-3 py-1 btn-cute text-sm w-fit">+新增主线地点</button>`;

    let timeCostHtml = "";
    if(!item.timeCostList) item.timeCostList = [{content:""}];
    item.timeCostList.forEach((tc,idx)=>{
      timeCostHtml +=`
        <div class="flex flex-nowrap gap-2 mt-1 items-center">
          <input class="border rounded-2xl p-2 text-sm timecost-input" id="time-cost-input-${item.dayNum}-${idx}" value="${tc.content}" placeholder="耗时" oninput="updateTimeCost(${item.dayNum},${idx},this.value)">
          <button onclick="delTimeCost(${item.dayNum},${idx})" class="bg-red-500 text-white btn-del-circle">×</button>
        </div>`
    })
    timeCostHtml += `<button onclick="addTimeCost(${item.dayNum})" class="mt-1 bg-green-400 text-white px-3 py-1 btn-cute text-sm w-fit">+新增耗时</button>`;

    let trafficHtml = "";
    item.trafficList.forEach((tr,idx)=>{
      trafficHtml +=`
        <div class="flex flex-nowrap gap-2 mt-1 items-center">
          <select class="border rounded-2xl p-2 text-sm traffic-select" id="traffic-select-${item.dayNum}-${idx}" oninput="updateTraffic(${item.dayNum},${idx},this.value)">
            <option value="">请选择</option>
            <option value="🚗自驾" ${tr.content==="🚗自驾"?"selected":""}>🚗自驾</option>
            <option value="🚍拼车/顺风车" ${tr.content==="🚍拼车/顺风车"?"selected":""}>🚍拼车/顺风车</option>
            <option value="🚌大巴" ${tr.content==="🚌大巴"?"selected":""}>🚌大巴</option>
            <option value="🚶徒步" ${tr.content==="🚶徒步"?"selected":""}>🚶徒步</option>
            <option value="✈️飞机" ${tr.content==="✈️飞机"?"selected":""}>✈️飞机</option>
            <option value="🚢轮船" ${tr.content==="🚢轮船"?"selected":""}>🚢轮船</option>
            <option value="其他" ${tr.content==="其他"?"selected":""}>其他</option>
          </select>
          <button onclick="delTraffic(${item.dayNum},${idx})" class="bg-red-500 text-white btn-del-circle">×</button>
        </div>`
    })
    trafficHtml += `<button onclick="addTraffic(${item.dayNum})" class="mt-1 bg-green-400 text-white px-3 py-1 btn-cute text-sm w-fit">+新增交通</button>`;

    let hotelHtml = "";
    item.hotelList.forEach((ht,idx)=>{
      hotelHtml +=`
        <div class="flex flex-wrap gap-3 mt-2 items-center bg-slate-50 p-3 rounded-2xl">
          <input class="flex-1 border rounded-xl p-2 text-sm" id="hotel-name-${item.dayNum}-${idx}" value="${ht.name}" placeholder="住宿名称" oninput="updateHotel(${item.dayNum},${idx},'name',this.value)">
          <button onclick="debouncedGetHotelLocPos(${item.dayNum},${idx})" class="bg-sky-400 text-white px-3 btn-cute">📍坐标</button>
          <button onclick="delHotel(${item.dayNum},${idx})" class="bg-rose-400 text-white btn-del-circle">×</button>
        </div>`
    })
    hotelHtml += `<button onclick="addHotel(${item.dayNum})" class="mt-3 bg-emerald-400 text-white px-4 py-2 btn-cute w-full">➕新增住宿</button>`;

    const noteData = item.dayNote;
    const detailCard = document.createElement("div");
    detailCard.className = "bg-white rounded-3xl p-4 card-shadow";
    detailCard.innerHTML = `
      <div class="flex justify-between items-center mb-3">
        <div class="flex items-center gap-2">
          <span class="dot-item" style="background-color:${item.dotColor}"></span>
          <h3 class="font-bold text-lg">
            <span contenteditable="true" class="edit-text" id="header-daynum-${item.dayNum}">D${item.dayNum}</span>
            <span contenteditable="true" class="edit-text ml-2" id="header-location-${item.dayNum}">${item.location}</span>
          </h3>
        </div>
        <button onclick="deleteDay(${item.dayNum})" class="text-red-500 text-sm btn-cute px-3 py-1 bg-red-100">删除当日</button>
      </div>
      <div class="mb-4">
        <label class="text-sm text-gray-500 label-edit" contenteditable="true" id="dateLabel-${item.dayNum}">${item.dateLabel}</label>
        ${item.dateStr ? `<div class="mt-1 text-gray-600" id="dateStr-${item.dayNum}">${item.dateStr}</div>` : ""}
      </div>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-1 md:gap-2 mb-4">
        <div><label class="text-sm text-gray-500 label-edit" contenteditable="true" id="trafficLabel-${item.dayNum}">${item.trafficLabel}</label>${trafficHtml}</div>
        <div><label class="text-sm text-gray-500 label-edit" contenteditable="true" id="timeCostLabel-${item.dayNum}">${item.timeCostLabel}</label>${timeCostHtml}</div>
        <div><label class="text-sm text-gray-500 label-edit" contenteditable="true" id="mainLocLabel-${item.dayNum}">${item.mainLocLabel}</label>${mainLocHtml}</div>
      </div>
      <div class="mb-4"><label class="text-sm text-gray-500 label-edit" contenteditable="true" id="hotelLabel-${item.dayNum}">${item.hotelLabel}</label>${hotelHtml}</div>
      <div class="border-y py-3 my-3">
        <div class="flex justify-between items-center mb-2">
          <p class="text-sm font-medium label-edit" contenteditable="true" id="timeLineLabel-${item.dayNum}">${item.timeLineLabel}</p>
          <button onclick="addTimePoint(${item.dayNum})" class="bg-green-400 text-white px-3 py-1 btn-cute text-xs">新增时间点</button>
        </div>
        <div>${timeHtml}</div>
        <div class="mt-3 flex items-center gap-2 bg-orange-5 rounded-2xl p-3">
          <span class="text-2xl">💰</span>
          <div><div class="text-sm text-gray-500">当日合计花费</div><div class="font-semibold text-red-500" id="day-total-${item.dayNum}">¥${calcSingleDayCost(item)}</div></div>
        </div>
      </div>
      <div class="mt-3">
        <div class="flex flex-wrap gap-3 items-center mb-2">
          <span class="text-sm font-medium label-edit" contenteditable="true" id="noteLabel-${item.dayNum}">${item.noteLabel}</span>
          <select id="note-weight-${item.dayNum}" class="border rounded-xl px-2 py-1 text-sm">
            <option value="normal" ${noteData.weight==="normal"?"selected":""}>常规字重</option>
            <option value="medium" ${noteData.weight==="medium"?"selected":""}>中等加粗</option>
            <option value="bold" ${noteData.weight==="bold"?"selected":""}>粗体</option>
          </select>
          <select id="note-size-${item.dayNum}" class="border rounded-xl px-2 py-1 text-sm">
            <option value="12" ${noteData.size==="12"?"selected":""}>12px小号</option>
            <option value="14" ${noteData.size==="14"?"selected":""}>14px默认</option>
            <option value="16" ${noteData.size==="16"?"selected":""}>16px大号</option>
          </select>
          <input type="color" value="${noteData.color}" id="note-color-${item.dayNum}" class="w-8 h-8 rounded-full border">
        </div>
        <div contenteditable="true" class="edit-text border rounded-2xl p-3" style="font-weight:${noteData.weight};font-size:${noteData.size}px;color:${noteData.color};" id="note-content-${item.dayNum}">${noteData.text}</div>
      </div>
    `;
    wrap.appendChild(detailCard);
  }
}

function handleCompStart(dayNum, timeIdx) {
  const dayItem = window.tripData.find(d => d.dayNum === dayNum);
  dayItem.timeList[timeIdx].isComposing = true;
}
function handleCompEnd(dayNum, timeIdx, val) {
  const dayItem = window.tripData.find(d => d.dayNum === dayNum);
  dayItem.timeList[timeIdx].isComposing = false;
  dayItem.timeList[timeIdx].event = val;
  saveLocalData();
}
function handleInputTyping(dayNum, timeIdx, val) {
  const dayItem = window.tripData.find(d => d.dayNum === dayNum);
  if (dayItem.timeList[timeIdx].isComposing) return;

  saveLocalData();

function getMainLocPos(dayNum, idx){

  AMap.plugin("AMap.Geocoder",()=>{

    g.getLocation(item.name,(s,res)=>{

function deleteDay(num){
  window.tripData = window.tripData.filter(d=>d.dayNum !== num);
  window.tripData.forEach((item,idx)=>{ item.dayNum = idx+1; item.dotColor = colorPool[idx % colorPool.length]; })
  if(activeView === num) activeView = "overview";
  saveLocalData(); renderDayTabs(); renderContent();
}

function batchImport(){
  const text = document.getElementById("batch-input").value.trim();
  if(!text) return alert("请粘贴行程文本");
  const lines = text.split("\n").filter(l=>l.trim());
  lines.forEach(line=>{
    const match = line.match(/D(\d+)[:：]\s*(.+?)[,，住宿](.+)/);
    if(!match) return;
    const dayNum = Number(match[1]); const loc = match[2].trim(); const hotel = match[3].trim();
    const exist = window.tripData.find(d=>d.dayNum === dayNum);
    if(exist) return;
    window.tripData.push({
      dayNum, location:loc, dateStr:"", dateLabel:"日期", mainLocLabel:"主线行程定位", timeCostLabel:"花费时间", trafficLabel:"交通备注", hotelLabel:"住宿地点", timeLineLabel:"当日时间线", noteLabel:"当日小结随笔备注",
      mainLocList:[{name:loc.split("→")[0].trim(), pos:null}], timeCostList:[{content:""}], trafficList:[{content:""}], hotelList:[{name:hotel, pos:null}], timeList:[],
      dayNote:{text:"", weight:"normal", size:"14", color:"#333333"},
      dotColor: colorPool[window.tripData.length % colorPool.length]
    })
  })
  saveLocalData(); renderDayTabs(); renderContent();
  document.getElementById("batch-input").value = "";
  alert("批量导入完成");
}
function toggleImportBox(){
  document.getElementById("importBox").classList.toggle("hidden");
}

function exportBackup(){
  const dataStr = JSON.stringify(window.tripData);
  const uint8Array = pako.gzip(dataStr);
  const blob = new Blob([uint8Array], {type: 'application/octet-stream'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "西藏行程备份.gz";
  a.click();
  URL.revokeObjectURL(url);
}
function importCompressed(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const uint8Array = new Uint8Array(e.target.result);
      const jsonStr = pako.ungzip(uint8Array, {to: 'string'});
      const data = JSON.parse(jsonStr);
      window.tripData = data;
      saveLocalData();
      activeView = "overview";
      renderDayTabs(); renderContent(); refreshMapRoute(); calcTotalMoney();
      alert("导入恢复成功！");
    } catch (err) { alert("导入失败，文件格式可能有误或损坏。"); }
  };
  reader.readAsArrayBuffer(file);
  event.target.value = '';
}
