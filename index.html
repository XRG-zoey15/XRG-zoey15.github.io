<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>西藏动态行程规划 本地缓存版</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="text/javascript">
    window._AMapSecurityConfig = {
      securityJsCode: "470f12745dd641e4be3ca8440eec7806"
    }
  </script>
  <script src="https://webapi.amap.com/maps?v=2.0&key=b29ac5f04a5004b5c2988cb573bc20c8"></script>
  <style>
    * {
      -webkit-tap-highlight-color: transparent;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      overflow-x: hidden;
    }
    body {
      font-size: 15px;
    }
    #map-container { height: 320px; width: 100%; }
    @media (min-width:768px) { #map-container { height: 500px; } }
    .card-shadow { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .day-tab-wrap { overflow-x: auto; scrollbar-width: thin; }
    .day-tab-wrap::-webkit-scrollbar { height:4px; }
    .day-tab-item { flex-shrink:0; border-radius:999px; padding:6px 12px; min-width: 72px; text-align:center; }
    .btn-round { border-radius:999px !important; }
    .btn-cute { border-radius: 16px !important; padding: 6px 8px !important; font-size:12px; min-height: 32px; touch-action: manipulation; }
    .btn-del-circle {
      border-radius: 9999px !important;
      width: 28px !important;
      height: 28px !important;
      padding: 0 !important;
      display: inline-flex !important;
      align-items: center !important;
      justify-content: center !important;
      font-size: 14px !important;
      flex-shrink: 0 !important;
      min-height: unset !important;
      z-index: 10;
      position: relative;
      right: -4px;
    }
    .dot-item { width:14px;height:14px;border-radius:999px;display:inline-block;}
    .edit-text:focus{outline:1px solid #93c5fd;background:#f0f7ff;}
    .label-edit { cursor:text; padding:2px 4px; border-radius:6px; display:inline-block; }
    .label-edit:hover { background:#f3f4f6; }
    .timeline-input { width: 120px !important; flex: none !important; }
    .timeline-time { width: 95px !important; flex: none !important; }
    .timeline-cost { width: 85px !important; flex: none !important; }
    .traffic-select { width: fit-content !important; min-width: 130px !important; field-sizing: content; flex: none !important; }
    .timecost-input { width: 140px !important; flex: none !important; }
    .mainloc-half-input { max-width: 48% !important; flex: 0 0 48% !important; }
    .hotel-half-input { max-width: 48% !important; flex: 0 0 48% !important; }
    input, select {
      padding: 8px 10px !important;
      font-size: 14px;
    }
    button {
      touch-action: manipulation;
    }
    .path-group-wrap {
      border: 1px solid #e5e7eb;
      border-radius: 20px;
      padding: 14px;
      margin-top: 10px;
      background: #fafafa;
    }
    /* 紧凑三列布局，间距16px */
    .path-row-grid {
      display: grid;
      grid-template-columns: 1fr 135px 145px;
      gap: 16px;
      align-items: start;
    }
    @media (max-width:767px) {
      .path-row-grid {
        grid-template-columns: 1fr;
        gap: 16px;
      }
    }
    .addr-desc-text {
      font-size: 11px;
      color: #059669;
      margin-top: 4px;
      line-height: 1.3;
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-800">
<div class="max-w-6xl mx-auto px-3 py-4 md:px-6 md:py-6">
  <h1 class="text-lg md:text-2xl font-bold text-center mb-4 text-blue-600" contenteditable="true">西藏动态行程规划 本地缓存版</h1>

  <div id="map-container" class="rounded-3xl card-shadow mb-6 bg-white"></div>

  <div class="day-tab-wrap flex gap-2 mb-4 pb-2" id="dayTabBox"></div>

  <div class="bg-white rounded-3xl p-4 card-shadow mb-6 grid grid-cols-2 gap-3 md:grid-cols-4">
    <div>
      <p class="text-sm text-gray-500">总行程天数</p>
      <p id="total-day" class="text-xl font-semibold">0</p>
    </div>
    <div>
      <p class="text-sm text-gray-500">全程总花费</p>
      <p id="total-money" class="text-xl font-semibold text-red-500">¥0.00</p>
    </div>
    <div>
      <p class="text-sm text-gray-500">平均每日开销</p>
      <p id="avg-money" class="text-xl font-semibold">¥0.00</p>
    </div>
    <div>
      <button onclick="exportBackup()" class="w-full bg-emerald-500 text-white py-2 btn-round text-sm">导出备份JSON</button>
    </div>
  </div>

  <div class="mb-4">
    <button onclick="toggleImportBox()" class="bg-slate-200 px-4 py-2 btn-round text-sm w-full">展开收起批量导入面板</button>
    <div id="importBox" class="hidden bg-white rounded-3xl p-4 card-shadow mt-3">
      <h2 class="font-bold mb-2 text-sm">批量导入行程 格式示例 D1 拉萨→八一镇 住宿八一镇</h2>
      <textarea id="batch-input" class="w-full border rounded-2xl p-2 h-20 text-sm" placeholder="粘贴全部行程清单"></textarea>
      <button onclick="batchImport()" class="mt-2 bg-blue-500 text-white px-4 py-2 btn-round w-full">一键导入生成行程</button>
    </div>
  </div>

  <button onclick="addNewDay()" class="w-full bg-sky-500 text-white py-3 btn-round font-medium mb-4">新增一天行程</button>

  <div id="page-content"></div>
</div>

<script>
const AMapKey = "b29ac5f04a5004b5c2988cb573bc20c8";
let map = null;
let polylineList = [];
let markers = [];
const STORAGE_KEY = "xizang_trip_data";
let activeView = "overview";
// 多组彩色，不同天数自动轮换
const colorPool = [
  "#ff9500","#22c55e","#a855f7","#3b82f6","#ef4444","#ec4899","#14b8a6","#f59e0b","#84cc16","#0ea5e9","#f43f5e","#7c3aed","#06b6d4","#e11d48","#65a30d","#0284c7"
];
const posCache = {};

function debounce(func, wait) {
  let timeout;
  return function(...args) {
    clearTimeout(timeout);
    timeout = setTimeout(() => func.apply(this, args), wait);
  }
}
const debouncedGetMainLoc = debounce(getMainLocPos, 500);
const debouncedGetHotelLoc = debounce(getHotelLocPos, 500);
const debouncedGetTimePointLoc = debounce(getSingleLocPos, 500);

window.onload = function(){
  initMap();
  loadLocalData();
  renderDayTabs();
  renderContent();
  calcTotalMoney();
  document.addEventListener("input", function(e){
    if(e.target.classList.contains("timeline-cost")){
      calcTotalMoney();
      const currentDay = window.tripData.find(d => d.dayNum === activeView);
      if(currentDay) refreshDayTotalText(currentDay);
    }
  })
}

function initMap(){
  map = new AMap.Map("map-container", {zoom:7, center:[91.128,29.654], resizeEnable:true});
  // 地图加载完成后强制刷新点位，解决图标空白
  map.on("complete", function(){
    refreshMapRoute();
  })
}

function loadLocalData(){
  const local = localStorage.getItem(STORAGE_KEY);
  window.tripData = local ? JSON.parse(local) : [];
  window.tripData.forEach((item,idx)=>{
    if(!item.timeList) item.timeList = [];
    if(!item.dayNote) item.dayNote = {text:"", weight:"normal", size:"14", color:"#333333"};
    if(!item.dateStr) item.dateStr = "";
    if(!item.dateLabel) item.dateLabel = "日期";
    if(!item.hotelLabel) item.hotelLabel = "住宿地点";
    if(!item.timeLineLabel) item.timeLineLabel = "当日时间线";
    if(!item.noteLabel) item.noteLabel = "当日小结随笔备注";

    if(!item.pathList) {
      item.pathList = [{
        mainLocList: item.mainLocList || [],
        trafficList: item.trafficList || [{content:""}],
        timeCostList: item.timeCostList || [{content:""}]
      }]
    }
    delete item.mainLocList;
    delete item.trafficList;
    delete item.timeCostList;

    if(!item.hotelList) item.hotelList = [];
    item.hotelList.forEach(h=>{
      if(!h.addrDetail) h.addrDetail = "";
    })
    item.dotColor = colorPool[idx % colorPool.length];
    item.timeList.forEach(t=>{
      if(!t.locList) t.locList = [{name:"", pos:null}];
      if(t.cost === undefined) t.cost = 0;
      t.isComposing = false;
    })
  })
}

function saveLocalData(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(window.tripData));
}

function renderDayTabs(){
  const wrap = document.getElementById("dayTabBox");
  wrap.innerHTML = "";
  const overviewTab = document.createElement("button");
  overviewTab.className = `day-tab-item btn-round ${activeView === "overview" ? "bg-blue-500 text-white":"bg-slate-200"}`;
  overviewTab.innerText = "总览";
  overviewTab.onclick = ()=>{activeView="overview";renderDayTabs();renderContent();};
  wrap.appendChild(overviewTab);

  window.tripData.sort((a,b)=>a.dayNum - b.dayNum);
  window.tripData.forEach(item=>{
    const tab = document.createElement("button");
    tab.className = `day-tab-item btn-round flex flex-col items-center gap-1 ${activeView === item.dayNum ? "bg-blue-500 text-white" : "bg-slate-200"}`;
    let dateText = "";
    if(item.dateStr){
      const dateArr = item.dateStr.split("/");
      if(dateArr.length >=2) dateText = `${dateArr[1]}/${dateArr[2]}`;
    }
    tab.innerHTML = `<span>D${item.dayNum}</span><span class="text-xs opacity-80">${dateText}</span>`;
    tab.onclick = ()=>{
      activeView = item.dayNum;
      renderDayTabs();
      renderContent();
    }
    wrap.appendChild(tab);
  })
}

// 地图Marker：完全匹配示例圆形数字图标，修复图标不显示问题
function refreshMapRoute(){
  if(!map) return;
  markers.forEach(m=>map.remove(m)); markers = [];
  polylineList.forEach(p=>map.remove(p)); polylineList = [];
  let globalAllPoints = [];
  window.tripData.sort((a,b)=>a.dayNum - b.dayNum);

  window.tripData.forEach(day=>{
    const dayPointGroup = [];
    day.pathList.forEach(path=>{
      path.mainLocList.forEach(loc=>{
        if(!loc.pos) return;
        const pos = loc.pos;
        dayPointGroup.push(pos);
        globalAllPoints.push(pos);
        // 原生无转义SVG，彻底解决图标空白；粗白外圈、居中粗白色纯数字
        const svg = `<svg width="48" height="48" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<circle cx="24" cy="24" r="22" fill="${day.dotColor}" stroke="#ffffff" stroke-width="5"/>
<text x="24" y="29" font-size="22" font-weight="900" fill="#ffffff" text-anchor="middle">${day.dayNum}</text>
</svg>`;
        const svgBase64 = "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(svg)));
        const marker = new AMap.Marker({
          position: pos,
          icon: new AMap.Icon({
            size: new AMap.Size(48,48),
            imageSize: new AMap.Size(48,48),
            image: svgBase64
          }),
          offset: new AMap.Pixel(-24, -24),
          title: `第${day.dayNum}天 ${loc.name}`,
          label: {
            content: `${loc.name}`,
            direction: "top",
            offset: new AMap.Pixel(0, -10),
            style: {
              background: "#fff",
              borderRadius: "10px",
              padding: "2px 8px",
              border: "none",
              boxShadow: "0 1px 4px rgba(0,0,0,0.1)"
            }
          }
        })
        marker.on("click",()=>{
          const url = `amapuri://route/plan/?did=&dlat=${pos.lat}&dlon=${pos.lng}&dname=${encodeURIComponent(loc.name)}&dev=0&t=0`;
          window.location.href = url;
        })
        map.add(marker);
        markers.push(marker);
      })
    })
    // 同一天内部虚线
    for(let i=1; i<dayPointGroup.length; i++){
      const dashLine = new AMap.Polyline({
        path: [dayPointGroup[i-1], dayPointGroup[i]],
        strokeColor: day.dotColor,
        strokeWeight: 3,
        strokeOpacity: 0.6,
        strokeDasharray: "8,6"
      })
      map.add(dashLine);
      polylineList.push(dashLine);
    }
  })
  // 跨天实线连接
  for(let i=1; i<globalAllPoints.length; i++){
    const targetDay = window.tripData.find(d=>{
      let has = false;
      d.pathList.forEach(p=>p.mainLocList.forEach(l=>{ if(l.pos?.lng === globalAllPoints[i-1].lng && l.pos?.lat === globalAllPoints[i-1].lat) has=true; }));
      return has;
    });
    const solidLine = new AMap.Polyline({
      path: [globalAllPoints[i-1], globalAllPoints[i]],
      strokeColor: targetDay.dotColor,
      strokeWeight:4,
      strokeOpacity:0.7
    })
    map.add(solidLine);
    polylineList.push(solidLine);
  }
}

function calcSingleDayCost(dayItem){
  let sum = 0;
  dayItem.timeList.forEach(t=> sum += Number(t.cost || 0));
  return sum.toFixed(2);
}

function refreshDayTotalText(dayItem){
  const el = document.querySelector(".border-y .text-red-500.font-semibold");
  if(el) el.innerText = `¥${calcSingleDayCost(dayItem)}`;
}

function calcTotalMoney(){
  let all = 0;
  window.tripData.forEach(d=> all += Number(calcSingleDayCost(d)));
  const dayCount = window.tripData.length;
  document.getElementById("total-money").innerText = `¥${all.toFixed(2)}`;
  document.getElementById("avg-money").innerText = dayCount ? `¥${(all/dayCount).toFixed(2)}` : "¥0.00";
  document.getElementById("total-day").innerText = dayCount;
}

function renderContent(){
  const wrap = document.getElementById("page-content");
  wrap.innerHTML = "";
  refreshMapRoute();
  calcTotalMoney();

  if(activeView === "overview"){
    window.tripData.forEach(item=>{
      const overviewItem = document.createElement("div");
      overviewItem.className="bg-white rounded-3xl p-4 card-shadow mb-3 cursor-pointer";
      const firstPath = item.pathList[0];
      const mainName = firstPath?.mainLocList[0]?.name || "";
      const hotelName = item.hotelList[0]?.name || "";
      overviewItem.innerHTML = `
        <div class="flex items-center gap-3">
          <span class="dot-item" style="background-color:${item.dotColor}"></span>
          <div class="flex-1">
            <div class="font-medium">
              <span contenteditable="true" class="edit-text">D${item.dayNum} ${item.location}</span>
            </div>
            <div class="text-sm text-gray-500 mt-1">
              <span contenteditable="true" class="edit-text label-edit" onblur="updateSingleField(${item.dayNum},'dateLabel',this.innerText)">${item.dateLabel}</span>
              ${item.dateStr ? `：${item.dateStr}` : ""}
            </div>
            <div class="text-sm text-gray-500"><span>住宿：</span>${hotelName}</div>
          </div>
          <span class="text-blue-500 text-sm shrink-0">查看详情</span>
        </div>
      `;
      overviewItem.onclick = (e)=>{
        if(e.target.isContentEditable) return;
        activeView = item.dayNum; renderDayTabs(); renderContent();
      }
      wrap.appendChild(overviewItem);
    })
  }else{
    const dayData = window.tripData.find(d=>d.dayNum === activeView);
    let timeHtml = "";
    dayData.timeList.forEach((t,ti)=>{
      let locHtml = "";
      t.locList.forEach((loc, li)=>{
        locHtml += `
        <div class="flex gap-2 mt-1 items-center flex-wrap">
          <input class="border rounded-xl p-1 text-sm timeline-input" value="${loc.name}" placeholder="地点名称" oninput="updateTimePointLoc(${dayData.dayNum},${ti},${li},'name',this.value)">
          <button onclick="debouncedGetTimePointLoc(${dayData.dayNum},${ti},${li})" class="bg-blue-400 text-white px-2 btn-cute text-xs">获取坐标</button>
          <button onclick="delTimePointLoc(${dayData.dayNum},${ti},${li})" class="bg-red-500 text-white btn-del-circle">×</button>
        </div>`;
      })
      timeHtml +=`
      <div class="flex flex-wrap gap-2 items-center mt-1">
        <input type="time" value="${t.time}" oninput="updateTimePoint(${dayData.dayNum},${ti},'time',this.value)" class="border rounded-xl p-1 text-sm timeline-time">
        <input 
          type="text" 
          value="${t.event}" 
          placeholder="记录事件" 
          class="border rounded-xl p-1 text-sm timeline-input"
          oncompositionstart="compStart(${dayData.dayNum},${ti})"
          oncompositionend="compEnd(${dayData.dayNum},${ti},this.value)"
          oninput="compInput(${dayData.dayNum},${ti},this.value)"
        >
        <input type="number" value="${t.cost||0}" placeholder="¥" oninput="updateTimePoint(${dayData.dayNum},${ti},'cost',Number(this.value||0))" class="border rounded-xl p-1 text-sm timeline-cost">
        <button onclick="addTimePointLoc(${dayData.dayNum},${ti})" class="bg-sky-400 text-white px-2 btn-cute text-xs">➕地点</button>
        <button onclick="delTimePoint(${dayData.dayNum},${ti})" class="bg-red-500 text-white btn-del-circle">×</button>
        <div class="w-full pl-1 mt-1">${locHtml}</div>
      </div>`;
    })

    let pathWrapHtml = "";
    dayData.pathList.forEach((pathGroup, pathIdx)=>{
      let mainLocHtml = "";
      pathGroup.mainLocList.forEach((loc,idx)=>{
        mainLocHtml += `
          <div class="flex flex-nowrap gap-2 mt-1 items-center">
            <input class="border rounded-2xl p-2 text-sm mainloc-half-input" value="${loc.name}" placeholder="主线地点" oninput="updatePathMain(${dayData.dayNum},${pathIdx},${idx},'name',this.value)">
            <button onclick="debouncedGetMainLoc(${dayData.dayNum},${pathIdx},${idx})" class="bg-blue-400 text-white px-3 btn-cute text-sm">获取坐标</button>
            <button onclick="delPathMain(${dayData.dayNum},${pathIdx},${idx})" class="bg-red-500 text-white btn-del-circle">×</button>
          </div>`
      })
      mainLocHtml += `<button onclick="addPathMain(${dayData.dayNum},${pathIdx})" class="mt-1 bg-green-400 text-white px-3 py-1 btn-cute text-sm w-fit">+主线点位</button>`;

      let trafficHtml = "";
      pathGroup.trafficList.forEach((tr,idx)=>{
        trafficHtml +=`
          <div class="flex flex-nowrap gap-2 mt-1 items-center">
            <select class="border rounded-2xl p-2 text-sm traffic-select" onchange="updatePathTraffic(${dayData.dayNum},${pathIdx},${idx},this.value)">
              <option value="">请选择</option>
              <option value="🚗自驾" ${tr.content==="🚗自驾"?"selected":""}>🚗自驾</option>
              <option value="🚍拼车/顺风车" ${tr.content==="🚍拼车/顺风车"?"selected":""}>🚍拼车/顺风车</option>
              <option value="🚌大巴" ${tr.content==="🚌大巴"?"selected":""}>🚌大巴</option>
              <option value="🚶徒步" ${tr.content==="🚶徒步"?"selected":""}>🚶徒步</option>
              <option value="✈️飞机" ${tr.content==="✈️飞机"?"selected":""}>✈️飞机</option>
              <option value="🚢轮船" ${tr.content==="🚢轮船"?"selected":""}>🚢轮船</option>
              <option value="其他" ${tr.content==="其他"?"selected":""}>其他</option>
            </select>
            <button onclick="delPathTraffic(${dayData.dayNum},${pathIdx},${idx})" class="bg-red-500 text-white btn-del-circle">×</button>
          </div>`
      })
      trafficHtml += `<button onclick="addPathTraffic(${dayData.dayNum},${pathIdx})" class="mt-1 bg-green-400 text-white px-3 py-1 btn-cute text-sm w-fit">+交通</button>`;

      let timeCostHtml = "";
      pathGroup.timeCostList.forEach((tc,idx)=>{
        timeCostHtml +=`
          <div class="flex flex-nowrap gap-2 mt-1 items-center">
            <input class="border rounded-2xl p-2 text-sm timecost-input" value="${tc.content}" placeholder="耗时" oninput="updatePathCost(${dayData.dayNum},${pathIdx},${idx},this.value)">
            <button onclick="delPathCost(${dayData.dayNum},${pathIdx},${idx})" class="bg-red-500 text-white btn-del-circle">×</button>
          </div>`
      })
      timeCostHtml += `<button onclick="addPathCost(${dayData.dayNum},${pathIdx})" class="mt-1 bg-green-400 text-white px-3 py-1 btn-cute text-sm w-fit">+耗时</button>`;

      pathWrapHtml += `
        <div class="path-group-wrap">
          <div class="flex justify-between items-center mb-3">
            <span class="font-medium text-sm">路径组 ${pathIdx+1}</span>
            <button onclick="delPathGroup(${dayData.dayNum},${pathIdx})" class="bg-red-100 text-red-500 btn-cute text-xs">删除本组路径</button>
          </div>
          <div class="path-row-grid">
            <div>
              <div class="text-xs text-gray-400 mb-1">主线行程定位（输入框减半）</div>
              ${mainLocHtml}
            </div>
            <div>
              <div class="text-xs text-gray-400 mb-1">交通备注</div>
              ${trafficHtml}
            </div>
            <div>
              <div class="text-xs text-gray-400 mb-1">花费时间</div>
              ${timeCostHtml}
            </div>
          </div>
        </div>
      `
    })

    let hotelHtml = "";
    dayData.hotelList.forEach((ht,idx)=>{
      let addrTip = ht.addrDetail ? `<div class="addr-desc-text">📍${ht.addrDetail}</div>` : "";
      hotelHtml +=`
        <div class="flex flex-wrap gap-3 mt-2 items-center bg-slate-50 p-3 rounded-2xl">
          <input class="border rounded-xl p-2 text-sm hotel-half-input" value="${ht.name}" placeholder="住宿名称" oninput="updateHotel(${dayData.dayNum},${idx},'name',this.value)">
          <button onclick="debouncedGetHotelLoc(${dayData.dayNum},${idx})" class="bg-sky-400 text-white px-3 btn-cute">获取街道级坐标</button>
          <button onclick="delHotel(${dayData.dayNum},${idx})" class="bg-rose-400 text-white btn-del-circle">×</button>
          ${addrTip}
        </div>`
    })
    hotelHtml += `<button onclick="addHotel(${dayData.dayNum})" class="mt-3 bg-emerald-400 text-white px-4 py-2 btn-cute w-full">➕新增住宿</button>`;

    const note = dayData.dayNote;
    const card = document.createElement("div");
    card.className = "bg-white rounded-3xl p-4 card-shadow";
    card.innerHTML = `
      <div class="flex justify-between items-center mb-3">
        <div class="flex items-center gap-2">
          <span class="dot-item" style="background-color:${dayData.dotColor}"></span>
          <h3 class="font-bold text-lg">
            <span contenteditable="true" class="edit-text">D${dayData.dayNum}</span>

      <div class="mt-3">

          <span class="text-sm font-medium label-edit" contenteditable="true" onblur="updateSingleField(${dayData.dayNum},'noteLabel',this.innerText)">${dayData.noteLabel}</span>
          <select onchange="setNoteWeight(${dayData.dayNum},this.value)" class="border rounded-xl px-2 py-1 text-sm">
            <option value="normal" ${note.weight==="normal"?"selected":""}>常规字重</option>
            <option value="medium" ${note.weight==="medium"?"selected":""}>中等加粗</option>
            <option value="bold" ${note.weight==="bold"?"selected":""}>粗体</option>
          </select>
          <select onchange="setNoteSize(${dayData.dayNum},this.value)" class="border rounded-xl px-2 py-1 text-sm">
            <option value="12" ${note.size==="12"?"selected":""}>12px小号</option>
            <option value="14" ${note.size==="14"?"selected":""}>14px默认</option>
            <option value="16" ${note.size==="16"?"selected":""}>16px大号</option>

          <input type="color" value="${note.color}" oninput="setNoteColor(${dayData.dayNum},this.value)" class="w-8 h-8 rounded-full border">
        </div>
        <div contenteditable="true" class="edit-text border rounded-2xl p-3" style="font-weight:${note.weight};font-size:${note.size}px;color:${note.color};" onblur="setNoteText(${dayData.dayNum},this.innerText)">${note.text}</div>
      </div>
    `;
    wrap.appendChild(card);
  }
}

// 定位函数（修复跨域、缓存、西藏自治区城市编码）
function getMainLocPos(dayNum, pathIdx, idx){
  if(!map) return alert("地图还未加载完成，请稍后重试");
  const d = window.tripData.find(x=>x.dayNum === dayNum);
  const loc = d.pathList[pathIdx].mainLocList[idx];
  const addr = loc.name.trim();
  if(!addr) return alert("请填写主线地点名称再获取坐标");
  if(posCache[addr]){
    loc.pos = posCache[addr];
    saveLocalData();
    refreshMapRoute();
    alert("坐标已从缓存读取，地图刷新完成");
    return;
  }
  AMap.plugin("AMap.Geocoder", ()=>{
    try {
      const geo = new AMap.Geocoder({city:"西藏自治区"});
      geo.getLocation(addr, (status, res)=>{
        if(status === "complete" && res.geocodes && res.geocodes.length > 0){
          loc.pos = res.geocodes[0].location;
          posCache[addr] = loc.pos;
          saveLocalData();
          refreshMapRoute();
          alert(`坐标获取成功：经度${loc.pos.lng} 纬度${loc.pos.lat}`);
        }else{
          console.error("地理编码无匹配结果", res);
          alert("未查询到该地点坐标，请修改地名（如拉萨、纳木错）重试");
        }
      })
    } catch(err){
      console.error("地理编码插件加载失败", err);
      alert("定位插件加载失败！请勿直接双击html打开，使用VSCode Live Server运行页面");
    }
  })
}

  const d = window.tripData.find(x=>x.dayNum === dayNum);
  d.hotelList.splice(idx,1);

function getHotelLocPos(dayNum, idx){
  if(!map) return alert("地图还未加载完成，请稍后重试");
  const d = window.tripData.find(x=>x.dayNum === dayNum);
  const ht = d.hotelList[idx];
  const addr = ht.name.trim();
  if(!addr) return alert("请输入住宿名称");
  if(posCache[addr]){
    ht.pos = posCache[addr];
    saveLocalData();
    renderContent();
    alert("坐标从缓存读取成功");
    return;
  }
  AMap.plugin("AMap.Geocoder",()=>{
    try{
      const geo = new AMap.Geocoder({city:"西藏自治区", extensions:"all"});
      geo.getLocation(addr,(s,res)=>{
        if(s === "complete" && res.geocodes.length){
          const geoData = res.geocodes[0];
          ht.pos = geoData.location;
          posCache[addr] = ht.pos;
          const province = geoData.province || "";
          const city = geoData.city || "";
          const district = geoData.district || "";
          const street = geoData.street || geoData.streetNumber || "";
          ht.addrDetail = `${province}${city}${district}${street}`;
          saveLocalData();
          renderContent();
          alert(`住宿街道坐标保存成功：${ht.addrDetail}`);
        }else{
          alert("未匹配到该住宿地址，请修改名称");
        }
      })
    }catch(err){
      console.error("住宿地理编码异常", err);
      alert("定位插件加载失败，请勿直接双击html打开文件，使用本地服务运行");
    }
  })
}

function deleteDay(num){
  window.tripData = window.tripData.filter(d=>d.dayNum !== num);
  window.tripData.forEach((item,idx)=>{
    item.dayNum = idx+1;
    item.dotColor = colorPool[idx % colorPool.length];
  })
  if(activeView === num) activeView = "overview";
  saveLocalData(); renderDayTabs(); renderContent();
}

function updateSingleField(dayNum, field, val){
  const d = window.tripData.find(x=>x.dayNum === dayNum);
  d[field] = val;
  saveLocalData();
}

// 批量导入导出
function toggleImportBox(){
  document.getElementById("importBox").classList.toggle("hidden");
}
function batchImport(){
  const text = document.getElementById("batch-input").value.trim();
  if(!text) return alert("请粘贴行程文本");
  const lines = text.split("\n").filter(l=>l.trim());
  lines.forEach(line=>{
    const match = line.match(/D(\d+)[:：]\s*(.+?)[,，住宿](.+)/);
    if(!match) return;
    const dn = Number(match[1]);
    const locText = match[2].trim();
    const hotelText = match[3].trim();
    if(window.tripData.find(d=>d.dayNum === dn)) return;
    window.tripData.push({
      dayNum: dn,
      location:locText,
      dateStr:"",
      dateLabel:"日期",
      hotelLabel:"住宿地点",
      timeLineLabel:"当日时间线",
      noteLabel:"当日小结随笔备注",
      pathList: [{
        mainLocList: [{name:locText.split("→")[0].trim(), pos:null}],
        trafficList: [{content:""}],
        timeCostList: [{content:""}]
      }],
      hotelList:[{name:hotelText, pos:null, addrDetail:""}],
      timeList:[],
      dayNote:{text:"", weight:"normal", size:"14", color:"#333333"},
      dotColor: colorPool[window.tripData.length % colorPool.length]
    })
  })
  saveLocalData(); renderDayTabs(); renderContent();
  document.getElementById("batch-input").value = "";
  alert("批量导入完成");
}
function exportBackup(){
  const jsonStr = JSON.stringify(window.tripData,null,2);
  const url = "data:text/json;charset=utf-8," + encodeURIComponent(jsonStr);
  const a = document.createElement("a");
  a.href = url;
  a.download = "西藏行程备份.json";
  a.click();
}
